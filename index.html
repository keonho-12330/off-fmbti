<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>O.F.F. Inter-View — 나의 패션 유형 찾기</title>
<meta property="og:title" content="O.F.F. Inter-View">
<meta property="og:description" content="12개의 질문으로 알아보는 나의 패션 유형과 어울리는 브랜드">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root{
  --ink:#1d1d1f;
  --black:#000;
  --paper:#ffffff;
  --line:#d2d2d7;
  --muted:#86868b;
  --fill:#f5f5f7;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter','Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'SF Pro KR','SF Pro Display',sans-serif;
  font-weight:400;
  line-height:1.6;
  letter-spacing:-0.012em;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;padding:0 24px}
.screen{display:none;flex:1;flex-direction:column}
.screen.active{display:flex;animation:fadein .5s cubic-bezier(.25,.1,.25,1)}
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ---------- header ---------- */
header{
  padding:18px 0 14px;
  border-bottom:1px solid var(--line);
  display:flex;justify-content:space-between;align-items:center;
}
header .logo svg{height:30px;width:auto;display:block}
header .sub{font-size:10px;font-weight:600;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}

/* ---------- intro ---------- */
#intro{justify-content:space-between;padding-bottom:36px}
.intro-top{padding-top:10vh}
.intro-logo svg{height:44px;width:auto;display:block;margin-bottom:36px}
.kicker{font-size:11px;font-weight:600;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-bottom:16px}
.intro-title{font-size:40px;font-weight:800;line-height:1.18;letter-spacing:-0.025em;margin-bottom:20px}
.intro-desc{font-size:15px;color:var(--muted);font-weight:400;margin-bottom:8px}
.intro-meta{margin-top:36px;border-top:1px solid var(--line);padding-top:18px;display:flex;gap:36px}
.intro-meta div{font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--muted)}
.intro-meta strong{display:block;font-size:22px;color:var(--ink);font-weight:700;letter-spacing:-0.02em}
.btn{
  display:block;width:100%;
  background:var(--black);color:#fff;
  border:none;cursor:pointer;
  font-family:inherit;
  font-size:15px;font-weight:600;letter-spacing:0;
  padding:16px 0;text-align:center;
  border-radius:980px;
  transition:transform .15s ease,opacity .2s;
}
.btn:active{transform:scale(.98);opacity:.85}
.btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink)}

/* ---------- quiz ---------- */
#quiz{padding-bottom:36px}
.progress-track{height:2px;background:var(--fill);margin-top:0;border-radius:2px}
.progress-bar{height:100%;background:var(--black);width:0%;transition:width .4s cubic-bezier(.25,.1,.25,1);border-radius:2px}
.qnum{font-size:12px;font-weight:600;letter-spacing:.12em;color:var(--muted);padding:30px 0 10px}
.qnum b{color:var(--ink);font-size:14px}
.qtext{font-size:23px;font-weight:700;line-height:1.35;letter-spacing:-0.02em;min-height:92px;margin-bottom:24px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{
  border:1px solid var(--line);background:#fff;
  text-align:left;padding:15px 16px;cursor:pointer;
  font-family:inherit;font-size:14.5px;font-weight:450;line-height:1.5;color:var(--ink);
  display:flex;gap:12px;align-items:flex-start;
  border-radius:14px;
  transition:border-color .15s,background .15s,transform .12s;
}
.opt .mark{font-size:12px;font-weight:700;color:var(--muted);padding-top:2.5px;letter-spacing:.02em}
.opt:active{border-color:var(--black);background:var(--fill);transform:scale(.99)}
.backlink{margin-top:auto;padding-top:22px;background:none;border:none;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;text-align:left;font-family:inherit}

/* ---------- result ---------- */
#result{padding-bottom:44px}
.r-card{border:1px solid var(--line);background:#fff;padding:34px 26px 28px;margin-top:26px;position:relative;border-radius:18px}
.r-card .corner{position:absolute;top:14px;right:18px;font-size:9px;font-weight:600;letter-spacing:.18em;color:var(--muted)}
.r-kicker{font-size:10px;font-weight:600;letter-spacing:.24em;color:var(--muted);text-transform:uppercase;margin-bottom:12px}
.r-code{font-weight:800;font-size:56px;letter-spacing:-0.02em;line-height:1;margin-bottom:10px}
.r-name{font-weight:700;font-size:22px;letter-spacing:-0.02em;margin-bottom:4px}
.r-tag{font-size:13.5px;color:var(--muted);font-weight:450;margin-bottom:22px}
.r-desc{font-size:14px;font-weight:400;color:#3a3a3c;border-top:1px solid var(--line);padding-top:20px}
.axes{margin-top:26px;display:flex;flex-direction:column;gap:14px}
.axis .labels{display:flex;justify-content:space-between;font-size:11px;font-weight:500;color:var(--muted);margin-bottom:6px}
.axis .labels .on{color:var(--ink);font-weight:700}
.axis .track{height:4px;background:var(--fill);position:relative;border-radius:4px;overflow:hidden}
.axis .fill{position:absolute;top:0;height:100%;background:var(--black);border-radius:4px}
.sec-title{font-weight:700;font-size:17px;letter-spacing:-0.02em;margin:44px 0 4px;display:flex;align-items:baseline;gap:10px}
.sec-title span{font-size:9px;font-weight:600;letter-spacing:.2em;color:var(--muted)}
.sec-sub{font-size:12.5px;color:var(--muted);font-weight:400;margin-bottom:16px}
.trait{
  border-bottom:1px solid var(--fill);
  padding:12px 2px;display:flex;gap:12px;align-items:flex-start;
  font-size:13.5px;font-weight:400;color:#3a3a3c;line-height:1.55;
}
.trait:first-of-type{border-top:1px solid var(--fill)}
.trait .check{color:var(--ink);font-size:12px;font-weight:700;padding-top:2px;min-width:14px}
.brand{border-bottom:1px solid var(--fill);padding:16px 2px;display:flex;gap:16px;align-items:baseline}
.brand:first-of-type{border-top:1px solid var(--fill)}
.brand .no{font-size:12px;font-weight:600;color:var(--muted);min-width:22px}
.brand .bname{font-weight:700;font-size:15px;letter-spacing:-0.01em}
.brand .breason{font-size:12.5px;color:var(--muted);font-weight:400;margin-top:2px}
.tip{background:var(--fill);padding:18px;font-size:13px;font-weight:400;color:#3a3a3c;margin-top:8px;border-radius:14px}
.tip b{font-weight:700;font-size:10px;letter-spacing:.18em;display:block;margin-bottom:6px;color:var(--ink)}
.r-actions{margin-top:40px;display:flex;flex-direction:column;gap:12px}
footer{padding:26px 0 32px;text-align:center;font-size:10px;font-weight:600;letter-spacing:.2em;color:var(--muted);text-transform:uppercase}
.toast{
  position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);
  background:var(--black);color:#fff;font-size:12.5px;font-weight:500;
  padding:11px 24px;border-radius:980px;opacity:0;pointer-events:none;transition:all .3s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

    desc:"새로운 것, 화제가 되는 것, 재미있는 것을 가장 빨리 시도하는 타입. 컬러와 그래픽, 믹스매치에 거침이 없고 주변의 스타일 레이더가 되어 줍니다.",
    traits:["발매일 알람을 맞춰본 적 있음","친구들이 유행 확인용으로 내 옷차림을 봄","어제 산 옷은 오늘 입어야 직성이 풀림","믹스매치에 실패란 없다고 생각함","옷장 회전율이 주변에서 제일 빠름","SNS 알고리즘이 온통 패션임","“벌써 샀어?”라는 말을 제일 자주 들음"],
    brands:[["ADER error 아더에러","실험적인 컬러와 유쾌한 해체"],["Supreme","하이프 컬처의 상징"],["KIRSH 키르시","키치한 그래픽과 컬러 팝"]],
    tip:"오늘의 유행을 즐기되 하나쯤은 당신만의 시그니처로 남기세요."},
};

/* ================= LOGIC ================= */
let current = 0;
let answers = []; // {s:'M', w:1} per question

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.remove('active'); void el.offsetWidth;
  el.classList.add('active');
  window.scrollTo({top:0});
}

function startQuiz(){
  current = 0; answers = [];
  renderQuestion();
  show('quiz');
}

function renderQuestion(){
  const q = QUESTIONS[current];
  document.getElementById('qcur').textContent = String(current+1).padStart(2,'0');
  document.getElementById('qtext').textContent = q.q;
  document.getElementById('pbar').style.width = (current/QUESTIONS.length*100)+'%';
  document.getElementById('backBtn').style.visibility = current===0 ? 'hidden':'visible';
  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  const marks = ['A','B','C','D'];
  q.opts.forEach((o,i)=>{
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = '<span class="mark">'+marks[i]+'</span><span>'+o.t+'</span>';
    btn.onclick = ()=>answer(o);
    opts.appendChild(btn);
  });
  const quiz = document.getElementById('quiz');
  quiz.classList.remove('active'); void quiz.offsetWidth; quiz.classList.add('active');
}

function answer(o){
  answers[current] = {s:o.s, w:o.w};
  if(current < QUESTIONS.length-1){ current++; renderQuestion(); }
  else { showResult(); }
}

function goBack(){
  if(current>0){ current--; renderQuestion(); }
}

function computeResult(){
  const score = {};
  answers.forEach(a=>score[a.s]=(score[a.s]||0)+a.w);
  let code = '';
  const pct = [];
  AXES.forEach(ax=>{
    const l = score[ax.left]||0, r = score[ax.right]||0;
    const winner = l>=r ? ax.left : ax.right;
    code += winner;
    pct.push({ax, l, r, total:l+r});
  });
  return {code, pct};
}

function showResult(){
  const {code, pct} = computeResult();
  const t = TYPES[code];
  document.getElementById('rcode').textContent = code;
  document.getElementById('rname').textContent = t.name;
  document.getElementById('rtag').textContent = '“'+t.tag+'”';
  document.getElementById('rdesc').textContent = t.desc;

  const axesEl = document.getElementById('raxes');
  axesEl.innerHTML = '';
  pct.forEach(p=>{
    const lp = Math.round(p.l/p.total*100);
    const rp = 100-lp;
    const leftWin = p.l>=p.r;
    const div = document.createElement('div');
    div.className='axis';
    div.innerHTML =
      '<div class="labels">'+
        '<span class="'+(leftWin?'on':'')+'">'+p.ax.left+' '+p.ax.leftLabel+' '+lp+'%</span>'+
        '<span class="'+(!leftWin?'on':'')+'">'+rp+'% '+p.ax.rightLabel+' '+p.ax.right+'</span>'+
      '</div>'+
      '<div class="track"><div class="fill" style="'+(leftWin?('left:0;width:'+lp+'%'):('right:0;width:'+rp+'%'))+'"></div></div>';
    axesEl.appendChild(div);
  });

  const trEl = document.getElementById('rtraits');
  trEl.innerHTML = '';
  t.traits.forEach(tr=>{
    const div = document.createElement('div');
    div.className='trait';
    div.innerHTML = '<span class="check">✓</span><span>'+tr+'</span>';
    trEl.appendChild(div);
  });

  const bEl = document.getElementById('rbrands');
  bEl.innerHTML = '';
  t.brands.forEach((b,i)=>{
    const div = document.createElement('div');
    div.className='brand';
    div.innerHTML = '<span class="no">'+String(i+1).padStart(2,'0')+'</span>'+
      '<div><div class="bname">'+b[0]+'</div><div class="breason">'+b[1]+'</div></div>';
    bEl.appendChild(div);
  });

  document.getElementById('rtip').innerHTML = '<b>STYLING NOTE</b>'+t.tip;
  document.getElementById('pbar').style.width = '100%';
  show('result');
}

function restart(){
  current=0; answers=[];
  show('intro');
}

function shareResult(){
  const {code} = computeResult();
  const t = TYPES[code];
  const text = '나의 패션 MBTI는 '+code+' — '+t.name+' “'+t.tag+'”';
  const url = location.href.split('#')[0];
  if(navigator.share){
    navigator.share({title:'O.F.F. Inter-View', text, url}).catch(()=>{});
  } else {
    navigator.clipboard.writeText(text+'\n'+url).then(()=>{
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'),2000);
    });
  }
}
</script>
